name: deon

# Two questions, and they are not the same one.
#
# Each implementation runs `spec/conformance/cases.json` for itself, and passing it proves that the
# implementation agrees with the fixtures. The harness asks whether the implementations agree with
# *each other*, which is a different claim — and the one that catches what the fixtures do not.
#
# `deon-python` once passed all 47 fixtures while indenting nested maps twice as far as its siblings,
# because no fixture nested that deeply. A divergence check nobody runs is a divergence check that
# does not exist, so it runs here.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
        working-directory: packages/deon-javascript
      - run: npm test
        working-directory: packages/deon-javascript

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # The crate must stay free of third-party dependencies by default. The workspace is three
      # first-party crates — `deon` (the facade), `deon-core` (the parser), and `deon-macros` (the
      # compile-time macros) — so the default `cargo tree` shows those three and nothing else. Any
      # other crate on the normal edges is a regression, whatever the tests say.
      - name: no third-party dependencies
        working-directory: packages/deon-rust
        run: |
          extra=$(cargo tree --edges normal -p deon \
            | sed -E 's/^[^a-zA-Z]*//; s/ .*//' \
            | grep -vxE 'deon|deon-core|deon-macros' \
            | grep -c . || true)
          if [ "$extra" -ne 0 ]; then
            echo "the default build gained a third-party dependency:"
            cargo tree --edges normal -p deon
            exit 1
          fi

      - run: cargo test --workspace
        working-directory: packages/deon-rust
      - run: cargo test --features cli
        working-directory: packages/deon-rust
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        working-directory: packages/deon-rust

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Nothing is installed, on purpose: the package must import in a bare interpreter.
      - name: no runtime dependencies
        working-directory: packages/deon-python
        run: |
          python3 -c "
          import tomllib
          declared = tomllib.load(open('pyproject.toml','rb'))['project'].get('dependencies')
          assert declared == [], f'the package declares dependencies: {declared}'
          "

      - name: tests
        working-directory: packages/deon-python
        run: PYTHONPATH=source python3 -m unittest discover -s tests -v

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # The module must stay dependency-free. `go list -m all` printing anything but the module
      # itself is a regression, whatever the tests say.
      - name: no dependencies
        working-directory: packages/deon-go
        run: |
          modules=$(go list -m all | grep -c .)
          if [ "$modules" -ne 1 ]; then
            echo "the module gained a dependency:"
            go list -m all
            exit 1
          fi

      - run: go vet ./...
        working-directory: packages/deon-go
      - run: go test ./...
        working-directory: packages/deon-go

  c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Zero third-party dependencies: the C standard library and POSIX only. A binary linking anything
      # beyond the system C runtime is a regression, whatever the tests say.
      - name: no third-party libraries
        working-directory: packages/deon-c
        run: |
          make deon
          extra=$(ldd build/deon | awk '{print $1}' | grep -vE '^(linux-vdso|libc|libm|libpthread|ld-linux|/lib)' || true)
          if [ -n "$extra" ]; then
            echo "the tool links a third-party library:"
            ldd build/deon
            exit 1
          fi

      - name: conformance
        working-directory: packages/deon-c
        run: make test

      - name: network
        working-directory: packages/deon-c
        run: make network

      - name: cache
        working-directory: packages/deon-c
        run: make cache

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Zero third-party dependencies: the Java standard library only. A jar on the build path is a
      # regression, whatever the tests say.
      - name: no third-party libraries
        working-directory: packages/deon-java
        run: |
          if find . -name '*.jar' | grep -q .; then
            echo "the package vendors a jar:"
            find . -name '*.jar'
            exit 1
          fi

      - name: conformance
        working-directory: packages/deon-java
        run: make test

      - name: network
        working-directory: packages/deon-java
        run: make network

      - name: cache
        working-directory: packages/deon-java
        run: make cache

  swift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      # Zero third-party dependencies: the Swift standard library, the C standard library and POSIX,
      # and the sibling deon-c sources compiled in by `make`. There is no Package.swift, so there is no
      # SwiftPM manifest through which a dependency could be pulled, and the binary links only the system
      # C runtime, the Swift runtime, and deon-c. Anything else on the link line is a regression.
      - name: no third-party libraries
        working-directory: packages/deon-swift
        run: |
          if [ -f Package.swift ]; then
            echo "the package uses SwiftPM, which can pull a dependency:"
            cat Package.swift
            exit 1
          fi
          make deon
          extra=$(ldd build/deon | awk '{print $1}' | grep -vE '^(linux-vdso|libc|libm|libpthread|libdl|librt|ld-linux|/lib|libstdc\+\+|libgcc_s|libswift|libdispatch|libBlocksRuntime|libicu)' || true)
          if [ -n "$extra" ]; then
            echo "the tool links a third-party library:"
            ldd build/deon
            exit 1
          fi

      - name: conformance
        working-directory: packages/deon-swift
        run: make test

      - name: network
        working-directory: packages/deon-swift
        run: make network

      - name: cache
        working-directory: packages/deon-swift
        run: make cache

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
        working-directory: packages/deon-javascript

      # The MCP server depends on `@plurid/deon` by `file:` and compiles against its published type
      # declarations, which live in `distribution/` and do not exist until the package is built. A
      # clean checkout has none, so without this the MCP's `tsc` cannot find the module at all.
      - run: npm run build
        working-directory: packages/deon-javascript

      - run: npm install
        working-directory: packages/tooling/deon-mcp
      - run: npm test
        working-directory: packages/tooling/deon-mcp

  # The one that catches what the fixtures cannot.
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - run: npm install
        working-directory: packages/deon-javascript

      - name: every implementation, the same inputs, the same outputs
        run: python3 scripts/harness.py

      # The libraries agreeing does not make the tools agree. The tools have defaults, an argument
      # grammar, an exit status, and a filesystem they write to, and none of that is in a fixture.
      - name: every tool, the same arguments, the same behaviour
        run: python3 scripts/cli-harness.py

[workspace]
members = ["core", "macros"]


[package]
name = "deon"
version = "0.0.0-11"
authors = ["ly3xqhl8g9 <ly3xqhl8g9@plurid.com>"]
license = "DEL"
description = "DeObject Notation Format of Structured Strings"
readme = "README.md"
homepage = "https://github.com/plurid/deon"
repository = "https://github.com/plurid/deon"
keywords = ["deon", "notation", "parser"]
categories = ["parser-implementations", "data-structures"]
edition = "2021"
rust-version = "1.70"


[lib]
name = "deon"
path = "src/lib.rs"


[features]
default = []

# The network is off by default and lives in the core; the facade forwards the feature. `cargo add
# deon` still pulls nothing at all.
network = ["deon-core/network"]

cli = ["network"]


[dependencies]
# Both first-party, both part of this workspace. `deon` is a thin facade: it re-exports the core in
# full and adds the two compile-time macros. There are no third-party dependencies in the default
# build — `cargo tree` shows only these crates, which are this project's own.
deon-core = { path = "core", version = "0.0.0-11" }
deon-macros = { path = "macros", version = "0.0.0-11" }


[dev-dependencies]
# Reads the language-neutral fixture manifest, `spec/conformance/cases.json`, and nothing else. The
# library must not depend on it, or the number rule would be lost.
serde_json = "1"


[[bin]]
name = "deon"
path = "src/bin/deon.rs"
required-features = ["cli"]

# The cross-implementation harness adapter. It uses only the crate and its own JSON reader, so it
# builds with no features and adds no dependency.
[[bin]]
name = "deon-harness"
path = "src/bin/harness.rs"

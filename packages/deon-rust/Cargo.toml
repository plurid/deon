[package]
name = "deon"
version = "0.0.0"
authors = ["ly3xqhl8g9 <ly3xqhl8g9@plurid.com>"]
license = "DEL"
description = "DeObject Notation Format of Structured Strings"
readme = "README.md"
homepage = "https://github.com/plurid/deon"
repository = "https://github.com/plurid/deon"
keywords = ["deon", "notation", "parser"]
categories = ["parser-implementations", "data-structures"]
edition = "2021"
rust-version = "1.70"


[lib]
name = "deon"
path = "src/lib.rs"


[dependencies]
# None. A data notation should not need any, and one rule of the specification forbids the obvious
# candidate outright: a JSON number must arrive as the spelling it was written with (9.1), which
# every general JSON parser has already destroyed. So the JSON reader is written here, and with it
# everything else.


[dev-dependencies]
# Reads the language-neutral fixture manifest, `spec/conformance/cases.json`, and nothing else. The
# library must not depend on it, or the number rule above would be lost.
serde_json = "1"
